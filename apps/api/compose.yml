name: vpc-music

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpc-music-${ENV:-local}-api
    restart: unless-stopped
    env_file:
      - .env
      - .env.${ENV:-local}
    environment:
      NODE_ENV: ${ENV:-local}
      PORT: ${PORT:-3001}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: vpc-music-${ENV:-local}-nginx
    restart: unless-stopped
    profiles:
      - proxy
    depends_on:
      - api
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN}
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  certbot:
    image: certbot/certbot:latest
    container_name: vpc-music-${ENV:-local}-certbot
    profiles:
      - proxy
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
